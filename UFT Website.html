<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UFT — Engineering, Software & Talent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=6" />
  <link rel="stylesheet" href="pages.css?v=6" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js?v=6"></script>
  <script type="text/babel" src="shell.jsx?v=6"></script>
  <script type="text/babel" src="page-home.jsx?v=6"></script>
  <script type="text/babel" src="page-rest.jsx?v=6"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const route = useRoute();
      let Page;
      switch (route) {
        case 'about': Page = AboutPage; break;
        case 'careers': Page = CareersPage; break;
        case 'jobs': Page = JobsPage; break;
        case 'contact': Page = ContactPage; break;
        case 'services':
        case 'industries':
          useEffect(() => {
            const t = setTimeout(() => {
              const id = route + '-section';
              const el = document.getElementById(id);
              if (el) {
                const top = el.getBoundingClientRect().top + window.pageYOffset - 64;
                window.scrollTo({ top, behavior: 'smooth' });
              }
            }, 100);
            return () => clearTimeout(t);
          }, [route]);
          Page = HomePage; break;
        case 'home':
        default: Page = HomePage; break;
      }
      // Map sub-routes back to home for nav active state
      const navRoute = (route === 'services' || route === 'industries' || route === '') ? 'home' : route;
      return (
        <>
          <Nav route={navRoute === 'home' ? route : navRoute} />
          <Page key={route} />
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
